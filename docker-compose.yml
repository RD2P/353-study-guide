name: 353-study-guide

services:

  frontend:
    build: ./frontend
    ports:
      - 80:5173
    volumes:
      - ./frontend:/app/
      - /app/node_modules
    stdin_open: true
    tty: true

  backend:
    build: ./backend
    ports:
      - 81:3000
    volumes:
      - ./backend:/app/
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      # named volume of postgres data
      - pgdata:/var/lib/postgresql/data

      # host mount init.sql to proper place in docker container
      # to run the script upon container start up
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d quiz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: